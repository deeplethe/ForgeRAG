# Benchmark — LLM-as-judge for offline answer evaluation
# ════════════════════════════════════════════════════════════════════════════
# Set `model` to something DIFFERENT from `answering.generator.model` —
# a model grading its own output is the textbook self-preference bias.
# Leave `model` empty to skip the dedicated judge; metrics.py falls back
# to the answer LLM with a self-preference warning in the log.
benchmark:
  model: ""                                 # ◢ FILL IN for unbiased scoring — pick a different vendor
                                            #   than the answer LLM, e.g. anthropic/claude-3-5-sonnet
  api_base: null
  api_key: null
  api_key_env: ""                           # ◢ FILL IN — e.g. JUDGE_API_KEY
  timeout: 30.0
